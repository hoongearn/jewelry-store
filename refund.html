<h1>Refund Policy</h1>

<section style="padding:40px">

<p>Customers may request a refund within 14 days of receiving the item.</p>

<p>The product must be unused and in original packaging.</p>

<p>Refunds will be processed after the item is returned and inspected.</p>

<p>Shipping fees are non-refundable unless the item is defective.</p>
